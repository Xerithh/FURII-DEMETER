          <div class="effect-3 effects"></div>
        </div>

    <script type="module" src="/src/main.js"></script>
    <script>
      const loaderColor =
        localStorage.getItem("sneat-initial-loader-bg") || "#FFFFFF";
      const primaryColor =
        localStorage.getItem("sneat-initial-loader-color") || "#696CFF";

      if (loaderColor)
        document.documentElement.style.setProperty(
          "--initial-loader-bg",
          loaderColor,
        );

      if (primaryColor)
        document.documentElement.style.setProperty(
          "--initial-loader-color",
          primaryColor,
        );
    </script>
